name: Build
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    name: Build
    runs-on: macos-15
    env:
      TZ: Asia/Tokyo
      JEKYLL_ENV: production
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0 # for jekyll-last-modified-at
      - name: Install Homebrew packages
        run: brew bundle --file .Brewfile
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.313.0
        with:
          bundler-cache: true
      - name: Build
        run: bundle exec jekyll build
